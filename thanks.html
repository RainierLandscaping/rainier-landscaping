<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thanks! — Rainier Landscaping</title>
  <link rel="canonical" href="https://rainierlandscaping.org/thanks.html">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --green: #4a7c59; --black: #1a1a1a; --white: #f9f9f7; --tan: #c9a96e; }
    body { font-family: 'Georgia', serif; background: var(--black); color: var(--white); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
    .logo { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 3rem; color: var(--white); }
    .logo em { color: var(--tan); font-style: normal; }
    .check { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 { font-size: clamp(1.8rem, 4vw, 2.5rem); font-weight: 700; margin-bottom: 1rem; }
    p { color: rgba(255,255,255,0.65); font-size: 1.05rem; max-width: 480px; line-height: 1.7; margin-bottom: 2rem; }
    .accent { color: var(--tan); font-weight: 600; }
    a.btn { display: inline-block; background: var(--green); color: var(--white); text-decoration: none; padding: 0.85rem 2rem; border-radius: 6px; font-size: 0.95rem; font-weight: 600; transition: background 0.2s; }
    a.btn:hover { background: #5a9069; }
  </style>
</head>
<body>
  <div class="logo">Rainier <em>Landscaping</em></div>
  <div class="check">✅</div>
  <h1>Quote Request Sent!</h1>
  <p>We got your message and will follow up <span class="accent">within a few hours</span> with a firm price — no pressure, no upsells.</p>
  <p>Check your email for a confirmation. We look forward to transforming your outdoor space!</p>
  <a class="btn" href="/">← Back to Home</a>
</body>
</html>
